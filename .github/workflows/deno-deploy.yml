name: Deno Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deno-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # deployctl uses GitHub OIDC with Deno Deploy when the repo is linked
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:deno-deploy

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          # Set repo variable DENO_DEPLOY_PROJECT to the exact project name in
          # https://dash.deno.com/ (Settings → project name, or URL path).
          project: ${{ vars.DENO_DEPLOY_PROJECT || 'tstack-start' }}
          entrypoint: server/index.ts
          root: .output
        env:
          # Optional: remove this secret if you use GitHub-linked OIDC only; a stale
          # token can make deployctl fail before OIDC succeeds.
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
