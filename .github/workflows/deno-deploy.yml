name: Deno Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deno-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:deno-deploy

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          # Must match the project name (or id) in https://dash.deno.com/
          project: tstack-start
          entrypoint: server/index.ts
          root: .output
        env:
          # Optional: set repo secret DENO_DEPLOY_TOKEN if deployctl auth fails without it
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
