name: Verify Deno Deploy build

# `denoland/deployctl` only targets Deno Deploy Classic (dash.deno.com). New Deno
# Deploy (console.deno.com, "Apps") builds from the linked GitHub repo using the
# `deploy` section in deno.json at the repo root. This workflow mirrors that
# install + build on GitHub runners so CI fails before a broken commit hits Deno.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deno-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:deno-deploy
